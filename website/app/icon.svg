<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Mesh edges (3D perspective) -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.25">
    <line x1="140" y1="180" x2="256" y2="120"/>
    <line x1="372" y1="180" x2="256" y2="120"/>
    <line x1="140" y1="180" x2="180" y2="320"/>
    <line x1="372" y1="180" x2="332" y2="320"/>
    <line x1="180" y1="320" x2="256" y2="400"/>
    <line x1="332" y1="320" x2="256" y2="400"/>
    <line x1="140" y1="180" x2="332" y2="320"/>
    <line x1="372" y1="180" x2="180" y2="320"/>
    <line x1="256" y1="120" x2="256" y2="400"/>
    <line x1="256" y1="120" x2="180" y2="320"/>
    <line x1="256" y1="120" x2="332" y2="320"/>
  </g>

  <!-- Mesh edges highlighted -->
  <g stroke="url(#glow)" stroke-width="2.5" opacity="0.5">
    <line x1="140" y1="180" x2="256" y2="120"/>
    <line x1="256" y1="120" x2="372" y2="180"/>
    <line x1="180" y1="320" x2="256" y2="400"/>
    <line x1="256" y1="400" x2="332" y2="320"/>
  </g>

  <!-- Node glows -->
  <g filter="url(#nodeGlow)" opacity="0.5">
    <circle cx="256" cy="120" r="14" fill="#3b82f6"/>
    <circle cx="140" cy="180" r="12" fill="#8b5cf6"/>
    <circle cx="372" cy="180" r="12" fill="#8b5cf6"/>
    <circle cx="180" cy="320" r="12" fill="#3b82f6"/>
    <circle cx="332" cy="320" r="12" fill="#3b82f6"/>
    <circle cx="256" cy="400" r="14" fill="#8b5cf6"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="120" r="10" fill="#e2e8f0"/>
    <circle cx="140" cy="180" r="8" fill="#c4b5fd"/>
    <circle cx="372" cy="180" r="8" fill="#c4b5fd"/>
    <circle cx="180" cy="320" r="8" fill="#93c5fd"/>
    <circle cx="332" cy="320" r="8" fill="#93c5fd"/>
    <circle cx="256" cy="400" r="10" fill="#e2e8f0"/>
  </g>

  <!-- Traveling particle (center line) -->
  <circle cx="256" cy="240" r="5" fill="#60a5fa" opacity="0.9">
    <animate attributeName="cy" values="140;380;140" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Traveling particle (diagonal) -->
  <circle cx="200" cy="240" r="4" fill="#a78bfa" opacity="0.7">
    <animate attributeName="cx" values="155;320;155" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="190;310;190" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
